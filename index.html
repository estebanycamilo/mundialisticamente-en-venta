<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mundialísticamente | Recomendaciones</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Poppins,sans-serif}
html{scroll-behavior:smooth}
body{background:#0b0f1a;color:white}

header{
 display:flex;
 justify-content:space-between;
 align-items:center;
 padding:20px 8%;
 background:#020617;
 position:sticky;
 top:0;
 z-index:1000
}

header h1{color:#22c55e}

nav a{margin:0 12px;color:white;text-decoration:none;font-weight:500}
nav a:hover{color:#22c55e}

.hero{
 height:75vh;
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
 text-align:center;
 background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.9)),url('https://images.unsplash.com/photo-1508098682722-e99c43a406b2?auto=format&fit=crop&w=1600&q=60') center/cover
}

.hero h2{font-size:44px;margin-bottom:10px}
.hero p{margin-bottom:20px}

.hero button{
 padding:14px 30px;
 background:#22c55e;
 border:none;
 border-radius:8px;
 color:white;
 font-size:16px;
 cursor:pointer
}

section{padding:70px 8%}

.section-title{
 text-align:center;
 margin-bottom:40px;
 color:#facc15
}

.grid{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
 gap:30px
}

.card{
 background:#111827;
 border-radius:12px;
 padding:20px;
 transition:.3s;
 box-shadow:0 0 20px rgba(0,0,0,.4)
}

.card:hover{transform:translateY(-8px)}

.card img{
 width:100%;
 height:180px;
 object-fit:cover;
 border-radius:10px;
 margin-bottom:15px
}

.card h3{color:#22c55e;margin-bottom:8px}
.card p{font-size:14px;margin-bottom:15px}

.buy-btn{
 display:inline-block;
 padding:10px 16px;
 background:#22c55e;
 color:white;
 text-decoration:none;
 border-radius:6px;
 font-size:14px
}

.buy-btn:hover{background:#16a34a}

.news{background:#111827}

.news-grid{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
 gap:25px
}

.news-card{
 background:#0b0f1a;
 padding:18px;
 border-radius:10px
}

.news-card img{
 width:100%;
 height:180px;
 object-fit:cover;
 border-radius:8px;
 margin-bottom:10px
}

.news-card a{color:#22c55e;text-decoration:none}

.contact form{
 max-width:500px;
 margin:auto;
 display:flex;
 flex-direction:column;
 gap:15px
}

.contact input,.contact textarea{padding:12px;border-radius:6px;border:none}

.contact button{
 padding:12px;
 background:#22c55e;
 border:none;
 border-radius:6px;
 color:white;
 font-weight:600;
 cursor:pointer
}

footer{
 text-align:center;
 padding:30px;
 background:#020617;
 color:#aaa;
 margin-top:40px
}

</style>
</head>

<body>

<header>
<h1>⚽ Mundialísticamente</h1>
<nav>
<a href="#inicio">Inicio</a>
<a href="#deportes">Deportes</a>
<a href="#tech">Tecnología</a>
<a href="#hogar">Hogar</a>
<a href="#noticias">Noticias</a>
</nav>
</header>

<section id="inicio" class="hero">
<h2>Productos Recomendados y Noticias</h2>
<p>Encuentra productos populares y las últimas noticias deportivas</p>
<button onclick="scrollToSection('deportes')">Explorar</button>
</section>

<section id="deportes">
<h2 class="section-title">⚽ Productos Deportivos</h2>
<div class="grid" id="sportsGrid"></div>
</section>

<section id="tech">
<h2 class="section-title">💻 Tecnología</h2>
<div class="grid" id="techGrid"></div>
</section>

<section id="hogar">
<h2 class="section-title">🏠 Hogar</h2>
<div class="grid" id="homeGrid"></div>
</section>

<section id="noticias" class="news">
<h2 class="section-title">📰 Noticias de Fútbol</h2>
<div class="news-grid" id="newsGrid"></div>
</section>

<section class="contact">
<h2 class="section-title">Contacto</h2>
<form onsubmit="sendMessage(event)">
<input type="text" placeholder="Nombre" required>
<input type="email" placeholder="Email" required>
<textarea rows="4" placeholder="Mensaje"></textarea>
<button>Enviar</button>
</form>
</section>

<footer>
<p>© 2026 Mundialísticamente</p>
</footer>

<script>

// PRODUCTOS CON IMÁGENES ESTABLES

const sportsProducts=[
{
name:"Balón de Fútbol Profesional",
img:"https://images.unsplash.com/photo-1575361204480-aadea25e6e68?auto=format&fit=crop&w=800&q=60",
desc:"Balón ideal para partidos y entrenamientos.",
link:"https://www.amazon.com/"
},
{
name:"Botines de Fútbol",
img:"https://images.unsplash.com/photo-1517649763962-0c623066013b?auto=format&fit=crop&w=800&q=60",
desc:"Botines ligeros y cómodos para jugar fútbol.",
link:"https://www.amazon.com/"
}
]

const techProducts=[
{
name:"Auriculares Bluetooth",
img:"https://images.unsplash.com/photo-1518444065439-e933c06ce9cd?auto=format&fit=crop&w=800&q=60",
desc:"Auriculares inalámbricos con gran calidad de sonido.",
link:"https://www.amazon.com/"
},
{
name:"Smartwatch Deportivo",
img:"https://images.unsplash.com/photo-1546868871-7041f2a55e12?auto=format&fit=crop&w=800&q=60",
desc:"Reloj inteligente para monitorear actividad física.",
link:"https://www.amazon.com/"
}
]

const homeProducts=[
{
name:"Cafetera Automática",
img:"https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&w=800&q=60",
desc:"Prepara café delicioso cada mañana.",
link:"https://www.amazon.com/"
},
{
name:"Lámpara LED Moderna",
img:"https://images.unsplash.com/photo-1507477338202-487281e6c27e?auto=format&fit=crop&w=800&q=60",
desc:"Iluminación elegante para cualquier habitación.",
link:"https://www.amazon.com/"
}
]

function renderProducts(list,containerId){

const grid=document.getElementById(containerId)

grid.innerHTML=""

list.forEach(p=>{

const card=document.createElement("div")
card.className="card"

card.innerHTML=`
<img src="${p.img}">
<h3>${p.name}</h3>
<p>${p.desc}</p>
<a class="buy-btn" href="${p.link}" target="_blank">Ver en Amazon</a>
`

grid.appendChild(card)

})

}

// NOTICIAS AUTOMÁTICAS

async function fetchNews(){

try{

const rssUrl = "https://www.espn.com/espn/rss/soccer/news"
const url = "https://api.allorigins.win/get?url=" + encodeURIComponent(rssUrl)

const res = await fetch(url)
const data = await res.json()

const parser = new DOMParser()
const xml = parser.parseFromString(data.contents,"text/xml")

const items = xml.querySelectorAll("item")

const grid = document.getElementById("newsGrid")
grid.innerHTML=""

items.forEach((item,index)=>{

if(index>5) return

const title = item.querySelector("title").textContent
const link = item.querySelector("link").textContent
const date = item.querySelector("pubDate").textContent

const card = document.createElement("div")
card.className="news-card"

card.innerHTML=`
<img src="https://source.unsplash.com/800x600/?soccer">
<h3>${title}</h3>
<p>${date}</p>
<a href="${link}" target="_blank">Leer noticia</a>
`

grid.appendChild(card)

})

}catch(e){

document.getElementById("newsGrid").innerHTML=
"<p>No se pudieron cargar las noticias ahora.</p>"

}

}

function scrollToSection(id){
 document.getElementById(id).scrollIntoView({behavior:"smooth"})
}

function sendMessage(e){
 e.preventDefault()
 alert("Mensaje enviado correctamente")
}

renderProducts(sportsProducts,"sportsGrid")
renderProducts(techProducts,"techGrid")
renderProducts(homeProducts,"homeGrid")

fetchNews()

</script>

</body>
</html>
