<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mundialísticamente | Tienda de Fútbol</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Poppins, sans-serif}
html{scroll-behavior:smooth}
body{background:#0b0f1a;color:white}
header{display:flex;justify-content:space-between;align-items:center;padding:20px 8%;background:#020617;position:sticky;top:0;z-index:1000}
header h1{color:#22c55e}
nav a{margin:0 12px;color:white;text-decoration:none;font-weight:500}
nav a:hover{color:#22c55e}
.hero{height:80vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;background:linear-gradient(rgba(0,0,0,.5),rgba(0,0,0,.9)),url('https://images.unsplash.com/photo-1508098682722-e99c43a406b2') center/cover}
.hero h2{font-size:48px;margin-bottom:10px}
.hero p{margin-bottom:20px}
.hero button{padding:14px 30px;background:#22c55e;border:none;border-radius:8px;color:white;font-size:16px;cursor:pointer}
section{padding:70px 8%}
.products h2,.news h2,.contact h2{margin-bottom:40px;text-align:center;color:#facc15}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:30px}
.card{background:#111827;border-radius:12px;padding:20px;transition:.3s;box-shadow:0 0 20px rgba(0,0,0,.4)}
.card:hover{transform:translateY(-8px)}
.card img{width:100%;border-radius:10px;margin-bottom:15px}
.card h3{color:#22c55e;margin-bottom:10px}
.card button{padding:10px 18px;border:none;background:#22c55e;border-radius:6px;cursor:pointer;color:white}
.news{background:#111827}
.news-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:25px}
.news-card{background:#0b0f1a;padding:20px;border-radius:10px}
.contact form{max-width:500px;margin:auto;display:flex;flex-direction:column;gap:15px}
.contact input,.contact textarea{padding:12px;border-radius:6px;border:none}
.contact button{padding:12px;background:#22c55e;border:none;border-radius:6px;color:white;font-weight:600;cursor:pointer}
.cart{position:fixed;right:20px;bottom:20px;background:#22c55e;color:white;padding:15px 20px;border-radius:50px;cursor:pointer}
.cart-panel{position:fixed;right:-400px;top:0;height:100%;width:350px;background:#020617;padding:20px;transition:.4s;overflow:auto}
.cart-panel.open{right:0}
.cart-item{display:flex;justify-content:space-between;margin-bottom:15px}
footer{text-align:center;padding:30px;background:#020617;color:#aaa;margin-top:50px}
</style>
</head>
<body>

<header>
<h1>⚽ Mundialísticamente</h1>
<nav>
<a href="#inicio">Inicio</a>
<a href="#productos">Productos</a>
<a href="#noticias">Noticias</a>
<a href="#contacto">Contacto</a>
</nav>
</header>

<section id="inicio" class="hero">
<h2>Todo para los amantes del fútbol</h2>
<p>Tienda, noticias y gadgets futbolísticos</p>
<button onclick="scrollToProducts()">Explorar productos</button>
</section>

<section id="productos" class="products">
<h2>🔥 Productos</h2>
<div class="grid" id="productGrid"></div>
</section>

<section id="noticias" class="news">
<h2>📰 Noticias</h2>
<div class="news-grid" id="newsGrid"></div>
</section>

<section id="contacto" class="contact">
<h2>Contacto</h2>
<form onsubmit="sendMessage(event)">
<input type="text" placeholder="Nombre" required>
<input type="email" placeholder="Email" required>
<textarea rows="4" placeholder="Mensaje"></textarea>
<button>Enviar</button>
</form>
</section>

<div class="cart" onclick="toggleCart()">🛒 Carrito (<span id="cartCount">0</span>)</div>

<div class="cart-panel" id="cartPanel">
<h2>Carrito</h2>
<div id="cartItems"></div>
<p id="total"></p>
<button onclick="checkout()">Comprar</button>
</div>

<footer>
<p>© 2026 Mundialísticamente ⚽</p>
</footer>

<script>
const products=[
{name:'Balón Profesional',price:40,img:'https://images.unsplash.com/photo-1575361204480-aadea25e6e68'},
{name:'Botines Elite',price:120,img:'https://images.unsplash.com/photo-1517649763962-0c623066013b'},
{name:'Camiseta Club',price:60,img:'https://images.unsplash.com/photo-1517927033932-b3d18e61fb3a'},
{name:'Guantes Portero',price:35,img:'https://images.unsplash.com/photo-1606813902914-3b4c7f8e9f29'},
{name:'Espinilleras',price:25,img:'https://images.unsplash.com/photo-1521417531039-15c8a8c2c7d5'}
]

// Noticias automáticas desde ESPN RSS
async function fetchNews(){
const url="https://api.rss2json.com/v1/api.json?rss_url=https://www.espn.com/espn/rss/soccer/news";

try{
const res = await fetch(url);
const data = await res.json();

const grid=document.getElementById('newsGrid');
grid.innerHTML='';

(data.items || []).slice(0,8).forEach(article=>{
const card=document.createElement('div');
card.className='news-card';

const img = article.thumbnail || "https://images.unsplash.com/photo-1508098682722-e99c43a406b2";

card.innerHTML=`
<img src="${img}" style="width:100%;border-radius:8px;margin-bottom:10px;">
<h3>${article.title}</h3>
<p>${article.pubDate.substring(0,10)}</p>
<p>${article.description.substring(0,120)}...</p>
<a href="${article.link}" target="_blank" style="color:#22c55e">Leer noticia</a>
`;

grid.appendChild(card);
});

}catch(err){
console.error("Error cargando noticias",err);
}
}

renderProducts();
fetchNews(){
const grid=document.getElementById('newsGrid')
news.forEach(n=>{
const card=document.createElement('div')
card.className='news-card'
card.innerHTML=`<h3>${n.title}</h3><p>${n.text}</p>`
grid.appendChild(card)
})
}

function addToCart(i){
cart.push(products[i])
updateCart()
}

function updateCart(){
const items=document.getElementById('cartItems')
const count=document.getElementById('cartCount')
items.innerHTML=''
let total=0
cart.forEach(p=>{
const div=document.createElement('div')
div.className='cart-item'
div.innerHTML=`<span>${p.name}</span><span>$${p.price}</span>`
items.appendChild(div)
 total+=p.price
})
count.textContent=cart.length
 document.getElementById('total').textContent='Total: $'+total
}

function toggleCart(){
document.getElementById('cartPanel').classList.toggle('open')
}

function checkout(){
alert('Compra simulada completada ⚽')
cart=[]
updateCart()
}

function scrollToProducts(){
document.getElementById('productos').scrollIntoView({behavior:'smooth'})
}

function sendMessage(e){
e.preventDefault()
alert('Mensaje enviado correctamente')
}

renderProducts()
renderNews()
</script>

</body>
</html>
