<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Noticias de Fútbol y Productos Deportivos | Mundialísticamente</title>

<meta name="description" content="Noticias de fútbol, productos recomendados y ofertas deportivas. Descubre balones, botines y más.">
<meta name="keywords" content="futbol, noticias futbol, productos futbol, balones, botines, deportes">
<meta name="author" content="Mundialísticamente">
<meta name="robots" content="index, follow">

<link rel="canonical" href="https://estebanycamilo.github.io/mundialisticamente-en-venta/">  

<meta property="og:title" content="Mundialísticamente | Productos y Noticias de Fútbol">
<meta property="og:description" content="Noticias de fútbol, productos recomendados y ofertas deportivas.">
<meta property="og:type" content="website">
<meta property="og:image" content="https://images.unsplash.com/photo-1508098682722-e99c43a406b2"> 

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Poppins,sans-serif
}

body{
background:#0b0f1a;
color:white
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
background:#020617;
position:sticky;
top:0;
z-index:1000
}

header h1{
color:#22c55e
}

nav a{
margin:0 12px;
color:white;
text-decoration:none;
font-weight:500
}

nav a:hover{
color:#22c55e
}

.hero{
height:70vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.9)),
url('https://images.unsplash.com/photo-1508098682722-e99c43a406b2?auto=format&fit=crop&w=1600&q=60') center/cover
}

.hero h2{
font-size:42px;
margin-bottom:15px
}

.hero button{
padding:14px 30px;
background:#22c55e;
border:none;
border-radius:8px;
color:white;
font-size:16px;
cursor:pointer
}

.hero button:hover{
background:#16a34a
}

section{
padding:70px 8%
}

.section-title{
text-align:center;
margin-bottom:40px;
color:#facc15
}

.search{
text-align:center;
margin-bottom:40px
}

.search input{
padding:12px;
width:300px;
border:none;
border-radius:6px
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px
}

.carousel{
display:flex;
overflow-x:auto;
gap:20px;
scroll-behavior:smooth
}

.carousel::-webkit-scrollbar{
display:none
}

.card{
background:#111827;
border-radius:12px;
padding:20px;
box-shadow:0 0 20px rgba(0,0,0,.4);
transition:0.3s;
min-width:250px
}

.card:hover{
transform:translateY(-6px)
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:10px;
margin-bottom:15px
}

.card h3{
color:#22c55e;
margin-bottom:8px
}

.card p{
font-size:14px;
margin-bottom:15px
}

.buy-btn{
display:inline-block;
padding:10px 16px;
background:#22c55e;
color:white;
text-decoration:none;
border-radius:6px;
font-size:14px
}

.buy-btn:hover{
background:#16a34a
}

.carousel-buttons{
display:flex;
justify-content:center;
gap:15px;
margin-bottom:25px
}

.carousel-buttons button{
padding:10px 20px;
border:none;
background:#22c55e;
color:white;
border-radius:6px;
cursor:pointer
}

.news{
background:#111827
}

.news-card{
background:#0b0f1a;
padding:18px;
border-radius:10px
}

.news-card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:8px;
margin-bottom:10px
}

footer{
text-align:center;
padding:30px;
background:#020617;
color:#aaa;
margin-top:40px
}

</style>
</head>

<body>

<header>

<h1>⚽ Mundialísticamente</h1>

<nav>
<a href="#productos">Productos</a>
<a href="#top">Más Vendidos</a>
<a href="#noticias">Noticias</a>
</nav>

</header>

<section class="hero">

<h2>Productos y Noticias del Mundo del Fútbol</h2>

<button onclick="scrollToSection('productos')">
Explorar
</button>

</section>

<section id="productos">

<h2 class="section-title">🛒 Productos Recomendados</h2>

<div class="search">
<input type="text" id="searchInput" placeholder="Buscar productos..." onkeyup="searchProducts()">
</div>

<div class="grid" id="productGrid"></div>

</section>

<section id="top">

<h2 class="section-title">🔥 Más Vendidos</h2>

<div class="carousel-buttons">
<button onclick="scrollCarousel(-1)">⬅</button>
<button onclick="scrollCarousel(1)">➡</button>
</div>

<div class="carousel" id="topGrid"></div>

</section>

<section id="noticias" class="news">

<h2 class="section-title">📰 Noticias de Fútbol</h2>

<div class="grid" id="newsGrid"></div>

</section>

<footer>

<p>© 2026 Mundialísticamente</p>

</footer>

<script>

const products=[

{
name:"Balón Profesional",
img:"https://images.unsplash.com/photo-1575361204480-aadea25e6e68?auto=format&fit=crop&w=800&q=60",
desc:"Balón ideal para entrenar y jugar partidos.",
link:"https://www.amazon.com/"
},

{
name:"Botines de Fútbol",
img:"https://images.unsplash.com/photo-1517649763962-0c623066013b?auto=format&fit=crop&w=800&q=60",
desc:"Botines ligeros para mayor velocidad.",
link:"https://www.amazon.com/"
},

{
name:"Auriculares Bluetooth",
img:"https://images.unsplash.com/photo-1518444065439-e933c06ce9cd?auto=format&fit=crop&w=800&q=60",
desc:"Auriculares perfectos para entrenar.",
link:"https://www.amazon.com/"
}

]

const topProducts=[

{
name:"Camiseta de Fútbol",
img:"https://images.unsplash.com/photo-1522778119026-d647f0596c20?auto=format&fit=crop&w=800&q=60",
desc:"Camiseta deportiva popular.",
link:"https://www.amazon.com/"
},

{
name:"Balón Adidas Profesional",
img:"https://images.unsplash.com/photo-1518091043644-c1d4457512c6?auto=format&fit=crop&w=800&q=60",
desc:"Balón de calidad profesional.",
link:"https://www.amazon.com/"
}

]

function renderProducts(list,container){

const grid=document.getElementById(container)

grid.innerHTML=""

list.forEach(p=>{

const card=document.createElement("div")

card.className="card"

card.innerHTML=`

<img src="${p.img}" loading="lazy">

<h3>${p.name}</h3>

<p>${p.desc}</p>

<a class="buy-btn" href="${p.link}" target="_blank" rel="nofollow noopener noreferrer">
Ver en Amazon
</a>

`

grid.appendChild(card)

})

}

function searchProducts(){

const input=document.getElementById("searchInput").value.toLowerCase()

const filtered=products.filter(p=>p.name.toLowerCase().includes(input))

renderProducts(filtered,"productGrid")

}

function scrollCarousel(direction){

const container=document.getElementById("topGrid")

container.scrollBy({
left:direction*300,
behavior:"smooth"
})

}

async function fetchNews(){

const API_KEY="pub_633372cd23894aec852d33f74e389d3d"

const url=`https://newsdata.io/api/1/news?apikey=${API_KEY}&q=futbol&language=es&category=sports`

try{

const res=await fetch(url)
const data=await res.json()

const grid=document.getElementById("newsGrid")

grid.innerHTML=""

if(!data || !data.results){
grid.innerHTML="No hay noticias disponibles"
return
}

data.results.slice(0,6).forEach(article=>{

const img=article.image_url || "https://images.unsplash.com/photo-1508098682722-e99c43a406b2?auto=format&fit=crop&w=800&q=60"

const card=document.createElement("div")

card.className="news-card"

card.innerHTML=`

<img src="${img}" loading="lazy">

<h3>${article.title}</h3>

<p>${article.description?article.description.substring(0,120):""}</p>

<a href="${article.link}" target="_blank" class="buy-btn">Leer noticia</a>

`

grid.appendChild(card)

})

}catch(e){

document.getElementById("newsGrid").innerHTML="No se pudieron cargar las noticias"

}

}

function scrollToSection(id){
document.getElementById(id).scrollIntoView({behavior:"smooth"})
}

renderProducts(products,"productGrid")
renderProducts(topProducts,"topGrid")

fetchNews()

setInterval(fetchNews,600000)

</script>

</body>
</html>
